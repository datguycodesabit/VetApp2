<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR Upload</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

  <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-6 text-center">
    <h2 class="text-2xl font-semibold mb-4 text-blue-800">OCR Upload</h2>

    <div class="relative w-full mb-4">
      <video id="video" autoplay playsinline class="rounded-xl shadow-md w-full"></video>
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <button id="capture" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition mb-2">Capture</button>

    <div id="statusText" class="mt-2 text-sm text-blue-600 break-words"></div>

        <button id="copyBtn" class="text-sm text-blue-600 hover:text-blue-800">Copy</button>
      </div>
      <pre id="ocrText" class="whitespace-pre-wrap text-gray-700 text-sm font-mono"></pre>
